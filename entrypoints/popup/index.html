<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mute Similar X Images</title>
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body>
    <div class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="popup-kicker">X Image Filter</p>
          <h1>Mute Similar X Images</h1>
        </div>
        <label class="popup-toggle" for="enabled">
          <span>On</span>
          <input id="enabled" name="enabled" type="checkbox" />
        </label>
      </header>

      <section class="popup-panel">
        <div class="popup-stats">
          <div>
            <span>Muted</span>
            <strong id="muted-count">0</strong>
          </div>
          <div>
            <span>Cache</span>
            <strong id="cache-count">0</strong>
          </div>
        </div>

        <form id="settings-form" class="popup-form">
          <label class="popup-field" for="api-key">
            <span>Gemini API key</span>
            <input
              id="api-key"
              name="apiKey"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="AIza..."
            />
          </label>

          <label class="popup-field" for="threshold">
            <span>Threshold</span>
            <div class="popup-slider-row">
              <input
                id="threshold"
                name="threshold"
                type="range"
                min="0.5"
                max="0.99"
                step="0.01"
              />
              <output id="threshold-value" for="threshold">0.92</output>
            </div>
          </label>

          <button id="save-button" class="primary" type="submit">
            Save
          </button>
        </form>
      </section>

      <section class="popup-panel popup-actions">
        <button id="undo-button" type="button">Undo last mute</button>
        <button id="reset-button" type="button">Reset muted library</button>
        <button id="clear-cache-button" type="button">Clear scan cache</button>
      </section>

      <p id="status" class="popup-status" role="status" aria-live="polite"></p>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
